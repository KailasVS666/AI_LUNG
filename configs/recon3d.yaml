seed: 42

data:
  splits_path: d:/AI_LUNG/outputs/splits/patient_split.json
  hu_min: -1000
  hu_max: 400
  patch_size: [64, 64, 64]   # 64³ voxel patches (new architecture)
  patches_per_volume:
    train: 12
    val: 6
  noise_std: 0.03             # Gaussian fallback if denoised_vol_dir not set
  # Optional: path to pre-exported denoised .npy volumes from Stage 1
  # denoised_vol_dir: d:/AI_LUNG/outputs/denoised_vols
  max_cases_per_split:
    train: 10
    val: 3

model:
  base_channels: 16
  l1_weight: 1.0
  ssim_weight: 0.5
  grad_weight: 0.2
  proj_weight: 0.1

train:
  batch_size: 1
  num_workers: 0
  epochs: 2
  learning_rate: 0.0002
  weight_decay: 0.00001
  output_dir: d:/AI_LUNG/outputs/train_runs/recon3d

runtime:
  device: auto
  mixed_precision: false
