seed: 42

data:
  dataset_root: d:/AI_LUNG/manifest-1600709154662
  metadata_csv:  d:/AI_LUNG/manifest-1600709154662/metadata.csv
  splits_path:   d:/AI_LUNG/outputs/splits/patient_split.json
  hu_min: -1000
  hu_max: 400
  target_spacing: 1.0
  context_slices: 4      # 9-slice input (4 + centre + 4)
  apply_clahe: false    # Disable CLAHE locally (needs OpenCV) — enable on Colab
  fast_mode: true       # Skip Radon simulation locally; use Gaussian noise instead
  low_dose_i0: 1e5       # Photon count for Radon/Poisson simulation (lower = noisier)
  fast_mode_noise_std: 0.05  # Gaussian noise std used in fast_mode
  max_cases_per_split:
    train: 5
    val: 2
    test: 5

loss:
  l1_weight: 1.0
  ssim_weight: 0.5
  grad_weight: 0.2

train:
  batch_size: 1
  num_workers: 0
  epochs: 2
  learning_rate: 0.0003
  weight_decay: 0.00001
  output_dir: d:/AI_LUNG/outputs/train_runs/denoiser_25d

runtime:
  device: auto
  mixed_precision: false
