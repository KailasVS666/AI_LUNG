seed: 42

data:
  splits_path: /content/AI_LUNG/outputs/splits/patient_split.json
  hu_min: -1000
  hu_max: 400
  patch_size: [32, 96, 96]
  patches_per_volume:
    train: 16
    val: 8
  noise_std: 0.03
  max_cases_per_split:
    train: null   # Use all 713 training series
    val: null     # Use all 153 val series

model:
  base_channels: 16
  l1_weight: 1.0
  grad_weight: 0.2
  range_weight: 0.05

train:
  batch_size: 4
  num_workers: 2
  epochs: 30
  learning_rate: 0.0002
  weight_decay: 0.00001
  output_dir: /content/drive/MyDrive/AI_LUNG_DATA/outputs/recon3d

runtime:
  device: auto
