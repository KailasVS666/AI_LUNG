seed: 42

data:
  dataset_root: /content/drive/MyDrive/AI_LUNG_DATA/manifest-1600709154662
  metadata_csv:  /content/drive/MyDrive/AI_LUNG_DATA/manifest-1600709154662/metadata.csv
  splits_path:   /content/AI_LUNG/outputs/splits/patient_split.json
  hu_min: -1000
  hu_max: 400
  target_spacing: 1.0
  context_slices: 4      # 9-slice input (4 + centre + 4)
  apply_clahe: true
  low_dose_i0: 1e5       # Poisson photon count (1e5 ≈ realistic low-dose)
  max_cases_per_split:
    train: null           # Use all 713 training series
    val: null             # Use all 153 val series
    test: null
  max_samples_per_series: 64 # Reduce from ~250 to 64 for 4x speedup
  fast_mode: True  # Use high-speed noise simulation instead of full physics
  fast_mode_noise_std: 0.05

  # Path where export_denoised.py saves the denoised .npy volumes
  # (used by Stage 2 as its input)
  denoised_out_dir: /content/drive/MyDrive/AI_LUNG_DATA/outputs/denoised_vols

  # Path to pre-processed .npy volumes from preprocess_to_npy.py
  # Run this ONCE before training for 10x faster data loading
  preprocessed_npy_dir: /content/drive/MyDrive/AI_LUNG_DATA/outputs/preprocessed_npy
  local_npy_cache: /content/local_npy  # Turbo-charge by syncing to local NVMe

loss:
  l1_weight: 1.0
  ssim_weight: 0.5
  grad_weight: 0.2

train:
  batch_size: 16  # Reduced from 32 to prevent T4 OOM with B5
  num_workers: 2  # Balance between speed and Colab IO stability
  epochs: 30
  learning_rate: 0.0003
  weight_decay: 0.00001
  output_dir: /content/drive/MyDrive/AI_LUNG_DATA/outputs/denoiser_25d
  early_stop_patience: 7      # Stop if val PSNR doesn't improve for 7 epochs
  early_stop_min_delta: 0.01  # Minimum improvement in dB to count as "better"

runtime:
  device: auto
  mixed_precision: true
